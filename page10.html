<div class="content"> 

 

    <div class="page-banner"> 

        <img src="contact.jpeg" alt="telephone dial"> 

        <div class="banner-overlay"> 

            <h1>Contact us</h1> 

        </div> 

    </div> 

 

 

 

    <section class="contact-section"> 

        <p>Have a question or want to get in touch? Fill in the form and we'll get back to you.</p> 

 

        <form> 

            

            <div class="form-group"> 

                <label for="name">Full Name: </label> 

                <input type="text" id="name" placeholder="Enter your full name" required> 

            </div> 

 

            <div class="form-group"> 

                <label for="email">Email Address: </label> 

                <input type="email" id="email" placeholder="Enter your email" required> 

            </div> 

 

            <div class="form-group"> 

                <label for="subject">Subject:</label> 

                <input type="text" id="subject" placeholder="What is your message about?" required> 

            </div> 

 

            <div class="form-group"> 

                <label for="message">Message:</label> 

                <textarea id="message" rows="6" placeholder="Type your message here..." required></textarea> 

            </div> 

 

            <button type="reset">Clear</button> 

            <button type="submit">Send Message</button> 

 

        </form> 

 

    </section> 

  

</div>
